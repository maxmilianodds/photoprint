<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER HUB | PHOTO PRINT</title>
    <style>
        :root {
            --neon: #39ff14;
            --bg: #0a0a0a;
            --card: rgba(255, 255, 255, 0.03);
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1a3a12 0%, #000 70%);
            z-index: -1;
        }

        /* Ajuste de Título Responsivo */
        h1.main-title {
            font-size: clamp(2rem, 12vw, 4rem); 
            margin: 0;
            color: var(--neon); text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon);
            text-align: center;
        }

        .subtitle {
            font-size: 0.8rem; letter-spacing: 5px; opacity: 0.6;
            margin-bottom: 30px; text-transform: uppercase; text-align: center;
        }

        /* LOGIN SCREEN */
        #login-screen {
            display: flex; flex-direction: column; align-items: center;
            width: 90%; z-index: 10;
        }

        .login-box {
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 30px 20px; border-radius: 20px;
            border: 1px solid rgba(57, 255, 20, 0.2);
            width: 100%; max-width: 320px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Input focado em teclado numérico e segurança */
        input#pass {
            background: #000; border: 1px solid #333;
            color: var(--neon); padding: 15px; width: 80%;
            text-align: center; font-size: 1.5rem; outline: none;
            border-radius: 10px; margin-bottom: 20px;
            font-family: monospace;
            /* Truque para esconder os números mesmo sendo tipo 'tel' */
            -webkit-text-security: disc; 
        }

        .btn-login {
            background: var(--neon); color: #000;
            border: none; padding: 15px 30px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; border-radius: 10px;
            width: 100%; font-size: 1rem;
        }

        /* HUB CONTENT */
        #hub-content { 
            display: none; width: 90%; flex-direction: column; align-items: center;
            padding: 40px 0;
        }

        .container {
            display: grid; grid-template-columns: 1fr; /* Uma coluna no mobile */
            gap: 15px; width: 100%; max-width: 500px;
        }

        /* Botões Estilo Mobile */
        .btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border-left: 4px solid var(--neon); padding: 20px;
            text-decoration: none; color: white; font-weight: bold;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s; border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
        }

        .btn:active { background: rgba(57, 255, 20, 0.2); transform: scale(0.98); }

        .btn span { font-size: 1.5rem; }

        #back-to-login {
            display: none; position: fixed; bottom: 20px; left: 20px;
            cursor: pointer; z-index: 100; color: var(--neon);
            font-size: 2rem; text-shadow: 0 0 10px var(--neon);
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: 1fr 1fr; max-width: 900px; }
            .subtitle { font-size: 1rem; letter-spacing: 10px; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="back-to-login" onclick="logout()"><span>⬅</span></div>

    <div id="login-screen">
        <h1 class="main-title">Photo Print</h1>
        <div class="subtitle">SISTEMA DE ACESSO</div>

        <div class="login-box">
            <p style="margin-top:0; font-size: 0.8rem; opacity: 0.7;">DIGITE A SENHA NUMÉRICA</p>
            <input type="tel" id="pass" pattern="[0-9]*" inputmode="numeric" placeholder="0000" maxlength="4" autofocus> 
            <button class="btn-login" onclick="checkPass()">Entrar no Hub</button>
        </div>
    </div>

    <div id="hub-content">
        <h1 class="main-title">Photo Print</h1>
        <div class="subtitle">Painel de Controle</div>

        <div class="container">
            <a href="celular.html" class="btn"><span>📸</span> <div>CAPTURA CELULAR <small style="display:block; opacity:0.5; font-size:10px">Captura Mobile</small></div></a>
            <a href="painel.html" class="btn"><span>⚙️</span> <div>PAINEL CONTROLE <small style="display:block; opacity:0.5; font-size:10px">Configuração Global</small></div></a>
            <a href="quiosque.html" class="btn"><span>🔍</span> <div>QUIOSQUE BUSCA <small style="display:block; opacity:0.5; font-size:10px">Interface Local</small></div></a>
            <a href="galeria.html" class="btn"><span>🖼️</span> <div>GALERIA CLIENTE <small style="display:block; opacity:0.5; font-size:10px">Download & QR</small></div></a>
            <a href="telao.html" class="btn"><span>🖥️</span> <div>TELÃO SLIDESHOW <small style="display:block; opacity:0.5; font-size:10px">Exibição de Fotos</small></div></a>
        </div>
    </div>

    <script>
        function checkPass() {
            const passField = document.getElementById('pass');
            const pass = passField.value;

            if(pass === "1234") { 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('hub-content').style.display = 'flex';
                document.getElementById('back-to-login').style.display = 'block';
            } else {
                alert("SENHA INCORRETA");
                passField.value = ""; // Limpa o campo
                passField.focus();    // Devolve o foco
            }
        }

        function logout() {
            document.getElementById('pass').value = "";
            document.getElementById('hub-content').style.display = 'none';
            document.getElementById('back-to-login').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('pass').focus();
        }

        // Detecta o Enter no teclado
        document.getElementById('pass').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                checkPass();
            }
        });
    </script>

</body>
</html>
